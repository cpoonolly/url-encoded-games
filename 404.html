<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect subpaths to index.html, encoding the path in the query string
      var path = window.location.pathname.replace('/url-encoded-games', '') + window.location.search;
      window.location.replace('/url-encoded-games/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
</html>
