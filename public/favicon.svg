<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#16171d"/>

  <!-- Grid lines -->
  <line x1="11" y1="4" x2="11" y2="28" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="4" x2="21" y2="28" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="11" x2="28" y2="11" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="21" x2="28" y2="21" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X in top-left cell -->
  <line x1="5.5" y1="5.5" x2="9.5" y2="9.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9.5" y1="5.5" x2="5.5" y2="9.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- O in top-right cell -->
  <circle cx="25.5" cy="7.5" r="2.5" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Red chip in bottom-left cell -->
  <circle cx="7.5" cy="25.5" r="2.8" fill="#ef4444"/>

  <!-- Yellow chip in bottom-right cell -->
  <circle cx="25.5" cy="25.5" r="2.8" fill="#facc15"/>
</svg>
